<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="enemyBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#95a5a6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </radialGradient>
    <filter id="enemyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#7f8c8d" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 敌人背景圆 -->
  <circle cx="100" cy="90" r="85" fill="url(#enemyBg)" stroke="#7f8c8d" stroke-width="3" filter="url(#enemyGlow)"/>
  
  <!-- 敌人图标 -->
  <text x="100" y="95" text-anchor="middle" font-size="50">👾</text>
  
  <!-- 敌人名称 -->
  <text x="100" y="145" text-anchor="middle" fill="#ffeaa7" font-family="Arial, sans-serif" font-size="16" font-weight="bold">颌虫</text>
  
  <!-- 敌人类型 -->
  <text x="100" y="162" text-anchor="middle" fill="#bdc3c7" font-family="Arial, sans-serif" font-size="11">普通</text>
  
  <!-- HP 条 -->
  <rect x="30" y="165" width="140" height="12" rx="6" fill="#2d3436"/>
  <rect x="30" y="165" width="140" height="12" rx="6" fill="#7f8c8d" opacity="0.7"/>
  <text x="100" y="174" text-anchor="middle" fill="#ecf0f1" font-family="Arial, sans-serif" font-size="10" font-weight="bold">HP: 14</text>
  
  <!-- 敌人ID -->
  <text x="192" y="15" text-anchor="end" fill="#7f8c8d" font-family="monospace" font-size="8">jaw_worm</text>
</svg>