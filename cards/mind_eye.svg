<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="220" viewBox="0 0 160 220">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="typeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.6" />
    </linearGradient>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feFlood flood-color="#3498db" flood-opacity="0.5"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
  </defs>
  
  <!-- 卡牌背景 -->
  <rect width="160" height="220" rx="12" fill="url(#cardBg)" stroke="#3498db" stroke-width="3"/>
  
  <!-- 类型头部 -->
  <rect x="0" y="0" width="160" height="40" rx="12" fill="url(#typeBg)"/>
  <rect x="0" y="30" width="160" height="15" fill="url(#typeBg)"/>
  
  <!-- 费用徽章 -->
  <circle cx="25" cy="25" r="18" fill="#2d3436" stroke="#3498db" stroke-width="2"/>
  <text x="25" y="31" text-anchor="middle" fill="#ffeaa7" font-family="Arial, sans-serif" font-size="18" font-weight="bold">1</text>
  
  <!-- 类型图标 -->
  <text x="80" y="28" text-anchor="middle" font-size="20">🃏</text>
  
  <!-- 卡牌名称 -->
  <text x="80" y="65" text-anchor="middle" fill="#ecf0f1" font-family="Arial, sans-serif" font-size="14" font-weight="bold">心眼</text>
  
  <!-- 流派和类型 -->
  <text x="80" y="85" text-anchor="middle" fill="#bdc3c7" font-family="Arial, sans-serif" font-size="10">法教 · 技能</text>
  
  <!-- 稀有度指示条 -->
  <rect x="10" y="95" width="140" height="2" fill="#3498db" opacity="0.6"/>
  
  <!-- 描述区域 -->
  <foreignObject x="10" y="105" width="140" height="90">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#bdc3c7;font-size:11px;font-family:Arial,sans-serif;text-align:center;line-height:1.4;">
      抽 2 张牌。若煞气 ≥70，额外消耗 2 理智。
    </div>
  </foreignObject>
  
  <!-- 底部装饰 -->
  <rect x="0" y="195" width="160" height="25" rx="0" fill="url(#typeBg)" opacity="0.4"/>
  <rect x="0" y="208" width="160" height="12" rx="12" fill="url(#typeBg)"/>
  
  <!-- 卡牌ID -->
  <text x="152" y="212" text-anchor="end" fill="#7f8c8d" font-family="monospace" font-size="8">mind_eye</text>
</svg>